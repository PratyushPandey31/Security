<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeCorp Solutions | Sign Up</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --background: #050811;
            --surface: #0d1527;
            --border: #1e2e56;
            --text-main: #F8FAFC;
            --text-muted: #7a8ba8;
            --accent: #00ff88;
            --error-color: #ff2d5b;
            --warning-color: #f59e0b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--background);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(79, 70, 229, 0.15) 0%, transparent 45%),
                radial-gradient(circle at 90% 80%, rgba(0, 212, 255, 0.1) 0%, transparent 45%);
            padding: 1.5rem;
            overflow-x: hidden;
        }

        .auth-container {
            width: 100%;
            max-width: 440px;
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-wrap {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo {
            font-size: 1.8rem;
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            color: var(--text-main);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo span {
            color: var(--primary);
            text-shadow: 0 0 15px rgba(79, 70, 229, 0.45);
        }

        .auth-card {
            background: linear-gradient(145deg, rgba(13, 21, 39, 0.85), rgba(8, 12, 24, 0.95));
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2.5rem 2rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            position: relative;
        }

        .auth-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, var(--primary), #00d4ff);
            border-radius: 16px 16px 0 0;
        }

        .auth-card h2 {
            font-size: 1.4rem;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            margin-bottom: 0.5rem;
            text-align: center;
        }

        .auth-subtitle {
            color: var(--text-muted);
            font-size: 0.85rem;
            text-align: center;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-control {
            width: 100%;
            padding: 0.8rem 1rem;
            background-color: rgba(5, 8, 17, 0.8);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: white;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
            background-color: rgba(5, 8, 17, 0.95);
        }

        .alert {
            padding: 0.8rem 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            font-weight: 500;
            line-height: 1.4;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .alert-error {
            background-color: rgba(255, 45, 91, 0.08);
            color: var(--error-color);
            border: 1px solid rgba(255, 45, 91, 0.2);
        }

        .btn {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), #4338CA);
            color: white;
            padding: 0.85rem;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.2);
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(79, 70, 229, 0.35);
            background: linear-gradient(135deg, #5b54f3, #4338CA);
        }

        .btn:active {
            transform: translateY(1px);
        }

        .auth-footer {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .auth-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .auth-footer a:hover {
            color: #6366F1;
            text-decoration: underline;
        }

        .back-home {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 2rem;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.2s;
        }

        .back-home:hover {
            color: var(--text-main);
        }

        /* Password strength indicator bars */
        .strength-container {
            margin-top: 0.5rem;
        }
        .strength-bars {
            display: flex;
            gap: 4px;
            margin-bottom: 0.25rem;
        }
        .bar {
            height: 4px;
            flex: 1;
            background-color: rgba(30, 48, 88, 0.6);
            border-radius: 2px;
            transition: background-color 0.3s;
        }
        .strength-text {
            font-size: 0.72rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="logo-wrap">
            <a href="/" class="logo">
                🛡️ Safe<span>Corp</span>
            </a>
        </div>

        <div class="auth-card">
            <h2>Create Account</h2>
            <div class="auth-subtitle">Register new credential profiles on the secure node</div>

            {% if error %}
                <div class="alert alert-error">
                    <span>⚠️</span> {{ error }}
                </div>
            {% endif %}

            <form action="/register" method="POST">
                <div class="form-group">
                    <label for="username">Pick Username</label>
                    <input type="text" id="username" name="username" class="form-control" placeholder="secuser" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="email">Work Email</label>
                    <input type="email" id="email" name="email" class="form-control" placeholder="name@safecorp.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="password">Create Password</label>
                    <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required autocomplete="new-password" oninput="checkStrength(this.value)">
                    <div class="strength-container">
                        <div class="strength-bars">
                            <div class="bar" id="bar1"></div>
                            <div class="bar" id="bar2"></div>
                            <div class="bar" id="bar3"></div>
                            <div class="bar" id="bar4"></div>
                        </div>
                        <div class="strength-text" id="strength-label">Password Strength: Weak</div>
                    </div>
                </div>
                <button type="submit" class="btn">Register Credentials</button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="/login">Login here</a>
            </div>
        </div>

        <div style="text-align: center;">
            <a href="/" class="back-home">← Back to SafeCorp Homepage</a>
        </div>
    </div>

    <script>
        function checkStrength(val) {
            const bar1 = document.getElementById('bar1');
            const bar2 = document.getElementById('bar2');
            const bar3 = document.getElementById('bar3');
            const bar4 = document.getElementById('bar4');
            const label = document.getElementById('strength-label');

            // Reset
            bar1.style.backgroundColor = '';
            bar2.style.backgroundColor = '';
            bar3.style.backgroundColor = '';
            bar4.style.backgroundColor = '';

            if (val.length === 0) {
                label.textContent = 'Password Strength: Empty';
                return;
            }

            let score = 0;
            if (val.length >= 8) score++;
            if (/[A-Z]/.test(val)) score++;
            if (/\d/.test(val)) score++;
            if (/[!@#$%^&*(),.?":{}|<>]/.test(val)) score++;

            const colors = ['#ff2d5b', '#f59e0b', '#00d4ff', '#00ff88'];
            const labels = ['Weak', 'Moderate', 'Strong', 'Excellent'];

            if (score >= 1) {
                bar1.style.backgroundColor = colors[score - 1];
            }
            if (score >= 2) {
                bar2.style.backgroundColor = colors[score - 1];
            }
            if (score >= 3) {
                bar3.style.backgroundColor = colors[score - 1];
            }
            if (score >= 4) {
                bar4.style.backgroundColor = colors[score - 1];
            }

            label.textContent = 'Password Strength: ' + labels[Math.max(0, score - 1)];
        }
    </script>
</body>
</html>
